name: "Secret Scanning"

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly scan on Mondays at 2 AM UTC

permissions:
  contents: read
  issues: write  # Allow creating issues for found secrets
  security-events: write  # Allow SARIF uploads

jobs:
  secret-scan:
    name: Scan for Exposed Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch full history for comprehensive scanning

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for Gitleaks Pro features
        with:
          # Upload results to GitHub Security tab
          sarif: true

      - name: Upload SARIF Results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: secret-scanning

      - name: Fail on Secrets Found
        if: failure()
        run: |
          echo "::error::🚨 Secrets detected in the codebase!"
          echo "Check the Security tab for details"
          exit 1
