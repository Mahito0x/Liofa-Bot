name: "CodeQL Advanced"

on:
  push:
    branches: ['*'] # runs from any branch
  pull_request:
    branches: ['*']
  schedule:
    # Run daily at 00:00 UTC cause I barely maintain it
    - cron: '0 0 * * *'

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      # Required for all workflows
      security-events: write
      # Required to fetch internal or private CodeQL packs
      packages: read
      # Only required for workflows in private repos although code scanning isn't supported on private repos
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
        build-mode: ['none'] # js doesn't rquire build 
        # CodeQL supports analyzing JavaScript and TypeScript together

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Node.js setup 
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    # Install dependencies (helps CodeQL understand the code better)
    - name: Install dependencies
      run: npm ci --ignore-scripts
      continue-on-error: true

    # Initialize CodeQL tools for scanning
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended,security-and-quality

    # Perform CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
