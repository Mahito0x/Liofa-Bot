name: "Dependency Review"

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write  # To allow commenting on PRs

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on critical or high severity vulnerabilities
          fail-on-severity: moderate
          # Allow specific licenses
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, ISC, BSD-2-Clause
          # Deny problematic licenses
          deny-licenses: GPL-3.0, AGPL-3.0
          # Comment on PR with results
          comment-summary-in-pr: always
          # Show vulnerability details
          vulnerability-check: true
          # Check for malicious packages
          warn-only: false

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dependency-review-results
          path: dependency-review-*.json
          retention-days: 30