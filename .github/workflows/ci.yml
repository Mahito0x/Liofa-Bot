name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Use Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

  test-bot-startup:
    name: Test Bot Startup
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        run: |
          cat > .env << EOF
          BOTTOKEN=${{ secrets.BOTTOKEN }}
          DEVTOKEN=${{ secrets.DEVTOKEN }}
          DEVCLIENTID=${{ secrets.DEVCLIENTID }}
          BOTADMIN=${{ secrets.BOTADMIN }}
          TESTINGSERVER=${{ secrets.TESTINGSERVER }}
          EOF

      - name: Test bot starts without errors
        run: |
          timeout 30s node start.js &
          BOT_PID=$!
          sleep 10
          if ps -p $BOT_PID > /dev/null; then
            echo "✅ Bot started successfully"
            kill $BOT_PID
            exit 0
          else
            echo "❌ Bot failed to start"
            exit 1
          fi
        timeout-minutes: 1