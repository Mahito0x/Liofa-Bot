version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Enable Dependabot security updates for npm (will also surface vulnerable transitive deps)
    security-updates: true
    # Keep both direct and indirect dependency updates by default
    allow:
      - dependency-type: "all"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Ensure security updates for GitHub Actions workflow dependencies
    security-updates: true
    # Optionally enabled security-only updates for GitHub Actions
    allow:
      - dependency-type: "direct"
